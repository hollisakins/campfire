# NIRSpec Program and Observation Configuration
# This file defines the mapping between program IDs, program names, observations, and fields

# CAPERS Program
[programs.capers]
name = "CAPERS"
program_id = "6368"
program_type = "GO"  # General Observer program
pi = "M. Dickinson"
description = "CANDELS Area PRISM Epoch of Reionization Survey"

# Observations for CAPERS program
[[programs.capers.observations]]
observation = "capers_uds_p2"
field = "UDS"
description = "CAPERS UDS pointing 2"

[[programs.capers.observations]]
observation = "capers_cosmos_p2"
field = "COSMOS"
description = "CAPERS COSMOS pointing 2"

# CAPERS Program
[programs.ember]
name = "EMBER"
program_id = "7076"
program_type = "GO"  # General Observer program
pi = "H. Akins"
description = "Early Massive Black Hole Reddening & Evolution"

# Observations for CAPERS program
[[programs.ember.observations]]
observation = "ember_uds_p1"
field = "UDS"
description = "EMBER UDS pointing 1"

# Observations for CAPERS program
[[programs.ember.observations]]
observation = "ember_uds_p4"
field = "UDS"
description = "EMBER UDS pointing 4"


