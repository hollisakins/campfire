# =============================================================================
# CATALOG OUTPUT CONFIGURATION
# Defines how flags are compiled for survey catalogs
# =============================================================================
[catalog_output]
description = "Configuration for survey catalog compilation"

  [catalog_output.columns]
  
    # Single integer column for quality
    [catalog_output.columns.z_quality]
    source = "redshift_quality"
    type = "integer"
    description = "Redshift quality flag (0-4)"
    
    # Bitmask columns for all flag categories
    [catalog_output.columns.z_features]
    source = "spectral_features"
    type = "bitmask"
    description = "Spectral features bitmask"
    
    [catalog_output.columns.obj_flags]
    source = "object_flags"
    type = "bitmask"
    description = "Object property flags bitmask"
    
    [catalog_output.columns.dq_flags]
    source = "dq_flags"
    type = "bitmask"
    description = "Data quality flags bitmask"
    
    # [catalog_output.columns.spec_flags]
    # source = "special_flags"
    # type = "bitmask"
    # description = "Special flags bitmask"

# =============================================================================
# MIGRATION MAPPING
# Maps old string-based flags to new bitmask system
# =============================================================================
[migration]
description = "Mapping for migrating from old string-based system"

  # Map old redshift quality values to new scale
  [migration.redshift_quality_map]
  "-1" = 1  # Bad -> Impossible
  "0" = 0   # None -> Not Inspected  
  "1" = 2   # Auto -> Tentative
  "2" = 4   # Good -> Secure

  # Map old flag strings to new flag keys
  [migration.object_flags_map]
  "LRD" = "LRD"
  "Broad line" = "broad_line"
  "Lya" = "lya_emitter"
  "Balmer break" = "balmer_break_galaxy"

  [migration.dq_flags_map]
  "Chip gap / detector gap" = "chip_gap"
  "Contamination from open shutter" = "contamination"
  "Possible stuck closed shutter" = "stuck_shutter"
  "Multiple sources in slitlet" = "multiple_sources"
  "No detection" = "no_detection"
  "Low S/N" = "low_snr"
  "Spectral overlap in grating" = "spectral_overlap"