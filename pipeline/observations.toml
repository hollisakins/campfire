# CEERS: split into two observations given different PAs
# multi-pointing objects will be stacked if PAs are the same

[ceers1] # pointings 4, 5, 7, 8, 9, 10
    field = 'egs'
    data_subdir = '1345'
    files = ['jw01345061*','jw01345062*','jw01345063*','jw01345064*','jw01345065*','jw01345066*','jw01345067*','jw01345068*','jw01345069*','jw01345071*']
    # files = ['jw01345068001_03101_00001*']
    # Nirspec4 = obs 061 (grating) + obs 062 (prism)
    # Nirspec5 = obs 064 (grating) + obs 063 (prism)
    # Nirspec7 = obs 066 (grating) + obs 065 (prism)
    # Nirspec8 = obs 068 (grating) + obs 067 (prism)
    # Nirspec9 = obs 069 (grating) 
    # Nirspec10 = obs 071 (grating) 
    gratings = ['PRISM','G140M','G235M','G395M']

    [ceers1.stage1]
        do_row_1f = false
        [ceers1.stage1.override_wavelength_range]
            G140M = [0.97, 5.0]
            G235M = [1.66, 5.0]

