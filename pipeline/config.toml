[pipeline]
    version = "v0.2"

[environment]
    CRDS_SERVER_URL = "https://jwst-crds.stsci.edu"
    CRDS_PATH = "/Users/hba423/simmons/crds/"
    CRDS_CONTEXT = "jwst_1464.pmap"

[paths]
    data_dir = "/Users/hba423/simmons/campfire/pipeline/data" # Raw data (uncals) from MAST 
    products_dir = "/Users/hba423/simmons/campfire/pipeline/products" # Reduced data products (split by observation)
    pictureframe_dir = "/Users/hba423/simmons/campfire/pipeline/templates/pictureframe"
    continuum_templates_file = "/Users/hba423/simmons/campfire/pipeline/templates/continuum_templates_hires.pickle"

[paths.r_curve_files]
    prism = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_prism_disp.fits"
    g395h = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g395h_disp.fits"
    g395m = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g395m_disp.fits"
    g235h = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g235h_disp.fits"
    g235m = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g235m_disp.fits"
    g140h = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g140h_disp.fits"
    g140m = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g140m_disp.fits"

[logging]
    level = "INFO"  # DEBUG, INFO, WARNING, ERROR
    format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[stage1]
    do_clean_flicker_noise = true
    mask_science_regions = true
    cleanup_uncal = true
    cleanup_rateints = true
    subtract_background = true
    box_size = 8
    sigma_clip = true
    bkg_estimator = 'median'
    do_col_1f = true       # subtract residual column-wise 1/f noise
    do_row_1f = true       # subtract residual row-wise 1/f noise
    plot = true

[stage1.override_wavelength_range]
    # Per-grating wavelength range overrides for slit masking.
    # Extend masks beyond default trace limits when needed.
    # Example: G140M = [0.97, 2.5]

[stage2]
    set_stellarity = 1.0
    rectify = false # produce rectified, background-subtracted products 

[stage3]
    cleanup_crfs = true

[fitting]
    ncores = 12
    save_models = false
    f_LSF_prism = 1.3
    f_LSF_g395m = 1.5
    f_LSF_g235m = 1.5
    f_LSF_g140m = 1.5
    