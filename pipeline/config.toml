[pipeline]
    version = "v0.2"

[environment]
    CRDS_SERVER_URL = "https://jwst-crds.stsci.edu"
    CRDS_PATH = "/Users/hba423/simmons/crds/"
    CRDS_CONTEXT = "jwst_1464.pmap"

[paths]
    data_dir = "/Users/hba423/simmons/campfire/pipeline/data" # Raw data (uncals) from MAST 
    products_dir = "/Users/hba423/simmons/campfire/pipeline/products" # Reduced data products (split by observation)
    pictureframe_dir = "/Users/hba423/simmons/campfire/pipeline/templates/pictureframe"

[paths.r_curve_files]
    prism = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_prism_disp.fits"
    g395h = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g395h_disp.fits"
    g395m = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g395m_disp.fits"
    g235h = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g235h_disp.fits"
    g235m = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g235m_disp.fits"
    g140h = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g140h_disp.fits"
    g140m = "/Users/hba423/simmons/campfire/pipeline/templates/jwst_nirspec_g140m_disp.fits"

[logging]
    level = "INFO"  # DEBUG, INFO, WARNING, ERROR
    format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[stage1]
    do_clean_flicker_noise = false # we basically do it after the fact
    mask_science_regions = true
    cleanup_uncal = true
    cleanup_rateints = true
    subtract_background = true # subtract background/picture frame
    subtract_2d = true # subtract 2D background model
    box_size = 8 # only used if subtract_2d is true
    sigma_clip = true # only used if subtract_2d is true
    bkg_estimator = 'median' # only used if subtract_2d is true
    do_col_1f = true       # subtract residual column-wise 1/f noise
    do_row_1f = true       # subtract residual row-wise 1/f noise
    plot = true

[stage1.override_wavelength_range]
    # Per-grating wavelength range overrides for slit masking.
    # Extend masks beyond default trace limits when needed.
    # Example: G140M = [0.97, 2.5]

[stage2]
    set_stellarity = 1.0
    rectify = true # produce rectified, background-subtracted products
    plot_bkgsub = true # plot background-subtracted 2D cutouts (requires rectify = true)

[stage3]
    combine_method = '1d'  # '2d' = stack all dithers in 2D then extract; '1d' = extract per-group then combine in 1D
    cleanup_crfs = true

[fitting]
    ncores = 1
    save_models = false
    optimized = false
    f_LSF_prism = 1.3
    f_LSF_g395m = 1.5
    f_LSF_g235m = 1.5
    f_LSF_g140m = 1.5

[template_grids]
    [template_grids.prism]
        file = "/Users/hba423/simmons/campfire/pipeline/templates/continuum_templates_prism.pickle"
        dv = 500
        z_min = 0
        z_max = 20
        gratings = ["prism"]
    [template_grids.medium]
        file = "/Users/hba423/simmons/campfire/pipeline/templates/continuum_templates_medium.pickle"
        dv = 100
        z_min = 0
        z_max = 15
        gratings = ["g140m", "g235m", "g395m"]
    [template_grids.high]
        file = "/Users/hba423/simmons/campfire/pipeline/templates/continuum_templates_high.pickle"
        dv = 30
        z_min = 0
        z_max = 15
        gratings = ["g140h", "g235h", "g395h"]
    