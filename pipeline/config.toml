[pipeline]
    version = "v0.2"

[environment]
    CRDS_SERVER_URL = "https://jwst-crds.stsci.edu"
    # CRDS_PATH defaults to $CAMPFIRE_ROOT/cache/crds if not set
    CRDS_CONTEXT = "jwst_1464.pmap"

[paths]
    # All paths resolve via $CAMPFIRE_ROOT by default.
    # Uncomment to override:
    # data_dir = "/custom/path/to/raw"
    # products_dir = "/custom/path/to/products"

[logging]
    level = "INFO"  # DEBUG, INFO, WARNING, ERROR
    format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

[stage1]
    do_clean_flicker_noise = false # we basically do it after the fact
    mask_science_regions = true
    cleanup_uncal = true
    cleanup_rateints = true
    subtract_background = true # subtract background/picture frame
    subtract_2d = true # subtract 2D background model
    box_size = 8 # only used if subtract_2d is true
    sigma_clip = true # only used if subtract_2d is true
    bkg_estimator = 'median' # only used if subtract_2d is true
    do_col_1f = true       # subtract residual column-wise 1/f noise
    do_row_1f = true       # subtract residual row-wise 1/f noise
    plot = true

[stage1.override_wavelength_range]
    # Per-grating wavelength range overrides for slit masking.
    # Extend masks beyond default trace limits when needed.
    # Example: G140M = [0.97, 2.5]

[stage2]
    set_stellarity = 1.0
    rectify = true # produce rectified, background-subtracted products
    plot_bkgsub = true # plot background-subtracted 2D cutouts (requires rectify = true)

[stage3]
    combine_method = '1d'  # '2d' = stack all dithers in 2D then extract; '1d' = extract per-group then combine in 1D
    cleanup_crfs = true

[fitting]
    ncores = 1
    save_models = false
    optimized = false
    f_LSF_prism = 1.3
    f_LSF_g395m = 1.5
    f_LSF_g235m = 1.5
    f_LSF_g140m = 1.5

[template_grids]
    # Template grid pickle files live at $CAMPFIRE_ROOT/cache/templates/
    # Paths here are relative to that directory (or absolute to override)
    [template_grids.prism]
        file = "continuum_templates_prism.pickle"
        dv = 500
        z_min = 0
        z_max = 20
        gratings = ["prism"]
    [template_grids.medium]
        file = "continuum_templates_medium.pickle"
        dv = 100
        z_min = 0
        z_max = 15
        gratings = ["g140m", "g235m", "g395m"]
    [template_grids.high]
        file = "continuum_templates_high.pickle"
        dv = 30
        z_min = 0
        z_max = 15
        gratings = ["g140h", "g235h", "g395h"]
