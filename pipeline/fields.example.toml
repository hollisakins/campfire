# fields.toml — NIRCam field definitions for CAMPFIRE pipeline
#
# Place this file at $CAMPFIRE_ROOT/config/fields.toml
# (or pass --fields-file to the CLI)
#
# Raw data layout is PID-organized and filter-binned:
#   $CAMPFIRE_ROOT/raw/nircam/{PID}/{filter}/*_uncal.fits
# Each PID directory also gets a manifest.ecsv written by `cfpipe download`
# capturing per-exposure metadata (filter, observtn, target RA/Dec, s_region).
#
# A field is defined by a list of file globs (one per PID, or per obs/visit
# slice), so the field definition selects which exposures contribute to its
# mosaics. PIDs are inferred from each glob's leading 'jwNNNNN'.
#
# Each section defines a field with:
#   filters       = list of NIRCam filters to reduce
#   files         = glob pattern(s) matching JWST fileset prefixes
#                   (e.g. 'jw01727*' = whole program, 'jw01727001*' = obs 1).
#                   Patterns support standard Python glob (`*`, `?`, `[abc]`)
#                   plus bash-style brace lists, expanded up-front into the
#                   underlying pattern list:
#                       'jw01727{001,002,003}*'   →   obs 001/002/003
#                       'jw01727{001,003}*_nrca?' →   cartesian product
#   skip          = optional glob pattern(s) to exclude from every step
#                   (uncal selection, per-exposure stages, mosaic resample).
#                   Same brace syntax as `files`. Per-step `files_to_skip`
#                   (e.g. under `[field.resample]`) stacks on top of this.
#   tangent_point = [RA, Dec] for mosaic WCS reference
#
# Tile WCS definitions nest under the field:
#   [field.tile_name]
#       rotation = degrees
#       # corners  = [[RA, Dec], ...]   # optional override; if omitted,
#       #                               # corners are auto-computed from the
#       #                               # first <scale>mas subsection plus
#       #                               # tangent_point + rotation.
#       [field.tile_name.30mas]
#           crpix = [x, y]
#           naxis = [nx, ny]
#       [field.tile_name.60mas]
#           crpix = [x, y]
#           naxis = [nx, ny]
#
# Per-field per-step overrides use a flat layout matching the
# canonical-exposure config namespace in config_default.toml:
#   [field.striping]
#       apply_flat = false
#       maxiters = 5
#   [field.jhat.refcat_dict]
#       f444w = "gaia_dr3_f444w.cat"
#       f200w = "gaia_dr3_f200w.cat"

[example_cosmos]
    filters = ['f115w', 'f150w', 'f200w', 'f277w', 'f356w', 'f410m', 'f444w']
    files = ['jw01727*', 'jw05893*']
    # skip = ['jw01727099*']   # exclude a known-bad visit from every step
    tangent_point = [150.1163213, 2.200973097]

    [example_cosmos.A1]
        rotation = 20
        corners = [[149.8703317, 2.0856512], [149.7198796, 2.1403395], [149.7908786, 2.3354095], [149.9413496, 2.2807163]]
        [example_cosmos.A1.30mas]
            crpix = [-22990, 23090]
            naxis = [19200, 24910]
        [example_cosmos.A1.60mas]
            crpix = [-11495, 11545]
            naxis = [9600, 12455]

    [example_cosmos.A2]
        rotation = 20
        corners = [[150.0058959, 2.0363591], [149.8554506, 2.0910612], [149.9264667, 2.2861269], [150.0769300, 2.2314186]]
        [example_cosmos.A2.30mas]
            crpix = [-5690, 23090]
            naxis = [19200, 24910]
        [example_cosmos.A2.60mas]
            crpix = [-2845, 11545]
            naxis = [9600, 12455]
