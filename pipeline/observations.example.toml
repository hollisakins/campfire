# observations.toml — Observation definitions for CAMPFIRE pipeline
#
# Place this file at $CAMPFIRE_ROOT/config/observations.toml
# (or pass --observations-file to the CLI)
#
# Each section defines an observation with:
#   field       = sky field name (e.g. 'cosmos', 'uds')
#   data_subdir = subdirectory under $CAMPFIRE_ROOT/raw/ containing uncal files
#   files       = glob pattern(s) matching JWST file prefixes
#                 prefix with '~' to exclude matches
#   gratings    = list of gratings used in this observation
#   program     = CAMPFIRE program slug (required, e.g. 'ember', 'jades')
#   program_id  = (optional) JWST program ID; auto-detected from filename if omitted
#
# Per-observation stage overrides can be nested:
#   [obs_name.stage1]
#       subtract_2d = true
#
# Manual masks (DS9 polygon regions in detector pixel coords) can be drawn
# in DS9 via `cfpipe nirspec mask edit --obs <name>` and stored as raw .reg
# strings under [obs_name.masks], keyed by rate file basename:
#   [obs_name.masks]
#       "jw01234001001_nrs1" = """
#       image
#       polygon(100,200,120,200,120,250,100,250)
#       """
# Masked pixels are OR'd as DO_NOT_USE into the rate file DQ before stage1
# background subtraction.

[example_cosmos_p1]
    field = 'cosmos'
    program = 'example_program'
    data_subdir = '1234'
    files = 'jw01234001001*'
    gratings = ['PRISM']

[example_uds_medium]
    field = 'uds'
    program = 'example_program'
    data_subdir = '5678'
    files = ['jw05678001001*', 'jw05678002001*']
    gratings = ['G235M', 'G395M']
    program_id = 5678

    [example_uds_medium.stage1]
        subtract_2d = true
        box_size = 16

    [example_uds_medium.masks]
        "jw05678001001_nrs1" = """
        image
        polygon(120,540,180,540,180,610,120,610)
        """
