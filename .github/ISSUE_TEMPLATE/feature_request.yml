name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web Portal
        - Pipeline (NIRSpec)
        - Pipeline (NIRCam)
        - Deployment / Infrastructure
        - Python Client
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the feature and why it would be useful.
    validations:
      required: true
