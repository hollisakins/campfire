name: Bug Report
description: Report a bug in the CAMPFIRE web portal or pipeline
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web Portal
        - Pipeline (NIRSpec)
        - Pipeline (NIRCam)
        - Deployment / Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug and what you expected to happen. Screenshots, error messages, or logs are helpful if you have them.
    validations:
      required: true
