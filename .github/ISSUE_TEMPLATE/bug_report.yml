name: Bug Report
description: Report a bug in the CAMPFIRE web portal or pipeline
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of CAMPFIRE is affected?
      options:
        - Web Portal
        - Pipeline (NIRSpec)
        - Pipeline (NIRCam)
        - Deployment / Infrastructure
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details
      placeholder: "Browser / OS / pipeline version / Python version"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Paste screenshots, error messages, or log output
    validations:
      required: false
